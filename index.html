    <style>
    *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    :root {
        --k0-mid: #DC2626;
        --k0-dark: #EF4444;
        --k0-grad: linear-gradient(135deg, #7F1D1D 0%, #DC2626 100%);
        --k1-mid: #16A34A;
        --k1-dark: #22C55E;
        --k1-grad: linear-gradient(135deg, #14532D 0%, #16A34A 100%);
        --k2-mid: #1D4ED8;
        --k2-dark: #3B82F6;
        --k2-grad: linear-gradient(135deg, #1E3A8A 0%, #2563EB 100%);
        --bg: #0F1117;
        --bg2: #181B24;
        --card: #1E2130;
        --card2: #252838;
        --border: #2A2E42;
        --border2: #363B56;
        --text: #F0F2FA;
        --muted: #7C82A0;
        --subtle: #4A4F6A;
        --accent: #E8B84B;
        --accent2: #F5D07A;
        --green: #22C55E;
        --red: #EF4444;
    }

    body {
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
    }

    #app {
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        background: var(--bg);
        position: relative;
        padding-bottom: 80px;
    }/* TOP BAR */

    .top-bar {
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        padding: 13px 18px 11px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 50;
    }

    .top-bar h1 {
        font-family: 'Bebas Neue', sans-serif;
        color: var(--text);
        font-size: 22px;
        letter-spacing: 2.5px;
    }

    .admin-btn {
        background: rgba(255, 255, 255, 0.08);
        border: 1.5px solid rgba(255, 255, 255, 0.25);
        color: var(--text);
        padding: 5px 13px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 11px;
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        transition: all 0.15s;
    }

    .admin-btn:hover {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.4);
    }/* KID TABS */

    .kid-tabs {
        display: flex;
        padding: 12px 16px 0;
        border-bottom: 1px solid var(--border);
    }

    .kid-tab {
        flex: 1;
        padding: 10px 4px 11px;
        cursor: pointer;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 17px;
        letter-spacing: 2px;
        text-align: center;
        border-bottom: 3px solid transparent;
        margin-bottom: -1px;
        color: var(--muted);
        transition: all 0.15s;
        background: transparent;
    }

    .kid-tab.k0:hover, .kid-tab.k0.active {
        border-bottom-color: var(--k0-dark);
        color: var(--k0-dark);
    }

    .kid-tab.k1:hover, .kid-tab.k1.active {
        border-bottom-color: var(--k1-dark);
        color: var(--k1-dark);
    }

    .kid-tab.k2:hover, .kid-tab.k2.active {
        border-bottom-color: var(--k2-dark);
        color: var(--k2-dark);
    }/* BALANCE CARD */

    .balance-card {
        margin: 14px 16px 0;
        border-radius: 8px;
        padding: 18px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: relative;
        overflow: hidden;
    }

    .balance-card::before {
        content: '';
        position: absolute;
        right: -30px;
        top: -30px;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.07);
    }

    .balance-card.k0 {
        background: var(--k0-grad);
    }

    .balance-card.k1 {
        background: var(--k1-grad);
    }

    .balance-card.k2 {
        background: var(--k2-grad);
    }

    .bal-label {
        font-size: 10px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.55);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 3px;
    }

    .bal-amount {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 56px;
        color: white;
        line-height: 1;
        letter-spacing: 3px;
    }

    .bal-unit {
        font-size: 11px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.55);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-top: 2px;
    }

    .bal-icon {
        font-size: 34px;
        position: relative;
        z-index: 1;
    }/* NAV TABS */

    .nav-tabs {
        display: flex;
        margin: 14px 16px 0;
        background: var(--card);
        border-radius: 6px;
        padding: 3px;
        border: 1px solid var(--border);
    }

    .nav-tab {
        flex: 1;
        padding: 8px 4px;
        text-align: center;
        cursor: pointer;
        font-size: 11px;
        font-weight: 700;
        color: var(--muted);
        border-radius: 4px;
        transition: all 0.15s;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .nav-tab.active {
        background: var(--accent);
        color: #0F1117;
    }

    .content {
        padding: 14px 16px;
    }

    .section-label {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 13px;
        color: var(--muted);
        letter-spacing: 2.5px;
        margin-bottom: 10px;
    }/* ACTIVITY LIST */

    .activity-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 20px;
    }

    .activity-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        background: var(--card);
        border: 1px solid var(--border);
        border-left: 3px solid var(--border2);
        border-radius: 6px;
        transition: all 0.15s;
        user-select: none;
    }

    .activity-item.done {
        border-left-color: var(--green);
        background: #0A1F12;
        border-color: #1C3A25;
    }

    .activity-item:hover:not(.done) {
        background: var(--card2);
        border-color: var(--border2);
    }

    function load() {
        onValue(dataRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                S = data;
                if (!Array.isArray(S.balances))
                    S.balances = Object.values(S.balances || {
                        0: 0,
                        1: 0,
                        2: 0
                    });
                if (!Array.isArray(S.kids))
                    S.kids = Object.values(S.kids || DEFAULTS.kids);
                if (!Array.isArray(S.activities))
                    S.activities = Object.values(S.activities || []);
                S.activities.forEach(a => {
                    if (!a.kidVis)
                        a.kidVis = [true, true, true];
                });
                if (!Array.isArray(S.rewards))
                    S.rewards = Object.values(S.rewards || []);
                if (!Array.isArray(S.history))
                    S.history = S.history ? Object.values(S.history) : [];
                if (!S.groupRewards)
                    S.groupRewards = [];
                else if (!Array.isArray(S.groupRewards))
                    S.groupRewards = Object.values(S.groupRewards);
                if (!S.completed || S.completed.date !== todayStr()) {
                    S.completed = {
                        date: todayStr(),
                        counts: [{}, {}, {}]
                    };
                    save();
                    return;
                }
                if (!Array.isArray(S.completed.counts))
                    S.completed.counts = S.completed.counts ? Object.values(S.completed.counts) : [{}, {}, {}];
            } else {
                S = JSON.parse(JSON.stringify(DEFAULTS));
                save();
                return;
            }
            render();
        });
    }

    function save() {
        set(dataRef, S).catch(e => console.error('Firebase save error:', e));
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
    }

    function getCount(kidIdx, actId) {
        const c = S.completed.counts[kidIdx];
        return c ? (c[actId] || 0) : 0;
    }
    function setCount(kidIdx, actId, val) {
        if (!S.completed.counts[kidIdx])
            S.completed.counts[kidIdx] = {};
        S.completed.counts[kidIdx][actId] = Math.max(0, val);
    }

    function increment(actId) {
        const act = S.activities.find(a => a.id === actId);
        if (!act)
            return;
        const cur = getCount(currentKid, actId);
        if (!act.repeatable && cur >= 1)
            return;
        if (act.repeatable && cur >= 3)
            return;
        setCount(currentKid, actId, cur + 1);
        S.balances[currentKid] += act.bucks;
        showToast(`+${act.bucks} Bucks Earned`);
        save();
        render();
    }

    function decrement(actId) {
        if (!adminMode)
            return;
        const act = S.activities.find(a => a.id === actId);
        if (!act)
            return;
        const cur = getCount(currentKid, actId);
        if (cur <= 0)
            return;
        setCount(currentKid, actId, cur - 1);
        S.balances[currentKid] = Math.max(0, S.balances[currentKid] - act.bucks);
        save();
        render();
    }

    function toggleCheck(actId) {
        const act = S.activities.find(a => a.id === actId);
        if (!act)
            return;
        const cur = getCount(currentKid, actId);
        if (cur > 0)
            return; // locked — cannot uncheck once checked
        setCount(currentKid, actId, 1);
        S.balances[currentKid] += act.bucks;
        showToast(`+${act.bucks} Bucks Earned`);
        save();
        render();
    }

    function openShopConfirm(rew) {
        if (S.balances[currentKid] < rew.bucks)
            return;
        confirmReward = rew;
        renderModal();
    }

    function confirmBuy() {
        if (!confirmReward)
            return;
        S.balances[currentKid] -= confirmReward.bucks;
        S.history.unshift({
            date: todayStr(),
            time: nowStr(),
            kidIdx: currentKid,
            rewardName: confirmReward.name,
            rewardEmoji: confirmReward.emoji,
            cost: confirmReward.bucks
        });
        showToast(`Redeemed: ${confirmReward.name}`);
        sendNotification(S.kids[currentKid], confirmReward.name, confirmReward.bucks, false);
        confirmReward = null;
        save();
        render();
    }

    function cancelBuy() {
        confirmReward = null;
        render();
    }

    function contributeGroupReward(grId) {
        const gr = S.groupRewards.find(g => g.id === grId);
        if (!gr)
            return;
        if (!gr.contributions)
            gr.contributions = [false, false, false];
        if (gr.contributions[currentKid])
            return; // already contributed
        if (S.balances[currentKid] < gr.bucks)
            return;
        // Confirm
        confirmReward = {
            ...gr,
            _isGroup: true
        };
        renderModal();
    }

    function confirmGroupContribute() {
        const gr = S.groupRewards.find(g => g.id === confirmReward.id);
        if (!gr)
            return;
        if (!gr.contributions)
            gr.contributions = [false, false, false];
        gr.contributions[currentKid] = true;
        S.balances[currentKid] -= gr.bucks;
        // Check if all contributed
        if (gr.contributions.every(c => c)) {
            S.history.unshift({
                date: todayStr(),
                time: nowStr(),
                kidIdx: -1,
                rewardName: gr.name,
                rewardEmoji: gr.emoji,
                cost: gr.bucks * 3,
                isGroup: true
            });
            gr.contributions = [false, false, false];
            sendNotification(null, gr.name, gr.bucks, true);
            showToast(`🎉 ${gr.name} fully unlocked!`);
        } else {
            sendNotification(S.kids[currentKid], `${gr.name} (group — contributed)`, gr.bucks, false);
            showToast(`Contributed ${gr.bucks} Bucks!`);
        }
        confirmReward = null;
        save();
        render();
    }

            </div>
            <div class="edit-form-actions">
              <button class="cancel-edit-btn" id="cancel-edit-act">Cancel</button>
              <button class="save-edit-btn" id="save-edit-act" data-id="${


            a.id}">Save Changes</button>
            </div>
          </div>`
            : ''}
        </div>`;}).join('')}
      <div class="add-form">
        <input id="na-emoji" class="f-emoji" placeholder="⭐" maxlength="2" />
        <input id="na-name" class="f-wide" placeholder="Activity name" />
        <input id="na-desc" class="f-wide" placeholder="Description (optional)" />
        <input id="na-bucks" class="f-sm" type="number" placeholder="Bucks" min="1" value="5" />
        <div class="toggle-row" style="width:100%">
          <span class="toggle-label">Repeatable (can do multiple times/day)</span>
          <button class="toggle" id="na-repeat" data-on="false"></button>
        </div>
        <button class="add-btn" id="add-act-btn">Add Activity</button>
      </div>
    </div>

    <div class="admin-section">
      <h3>Rewards / Shop Items</h3>
      ${














        S.rewards.map(r => {const isEditing = editingId === r.id && editingType === 'reward';return `
        <div class="admin-row" style="flex-direction:column;align-items:flex-start;gap:2px;">
          <div style="display:flex;align-items:center;gap:8px;width:100%">
            <span class="admin-row-emoji">${

            r.emoji}</span>
            <span class="admin-row-name">${r.name}</span>
            <span class="admin-row-meta">${r.bucks} 💵</span>
            <button class="edit-btn" data-edit-rew="${r.id}" title="Edit">✎</button>
            <button class="del-btn" data-del-rew="${r.id}">×</button>
          </div>
          ${
            isEditing ? `
          <div class="edit-form">
            <div class="edit-form-row">
              <input id="er-emoji" class="ef-emoji" value="${

            r.emoji}" maxlength="2" />
              <input id="er-name" class="ef-wide" value="${r.name}" placeholder="Reward name" />
              <input id="er-bucks" class="ef-sm" type="number" value="${r.bucks}" min="1" />
            </div>
            <div class="edit-form-actions">
              <button class="cancel-edit-btn" id="cancel-edit-rew">Cancel</button>
              <button class="save-edit-btn" id="save-edit-rew" data-id="${


            r.id}">Save Changes</button>
            </div>
          </div>`
            : ''}
        </div>`;}).join('')}
      <div class="add-form">
        <input id="nr-emoji" class="f-emoji" placeholder="🎁" maxlength="2" />
        <input id="nr-name" class="f-wide" placeholder="Reward name" />
        <input id="nr-bucks" class="f-sm" type="number" placeholder="Bucks" min="1" value="10" />
        <button class="add-btn" id="add-rew-btn">Add Reward</button>
      </div>
    </div>

    <div class="admin-section">
      <h3>Group Rewards</h3>
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5">All three kids must contribute to unlock these. Set the amount each kid contributes.</p>
      ${










        (S.groupRewards || []).map(gr => {const isEditing = editingId === gr.id && editingType === 'group';const contribs = gr.contributions || [false, false, false];return `
        <div class="admin-row" style="flex-direction:column;align-items:flex-start;gap:2px;">
          <div style="display:flex;align-items:center;gap:8px;width:100%">
            <span class="admin-row-emoji">${

            gr.emoji}</span>
            <span class="admin-row-name">${gr.name}</span>
            <span class="admin-row-meta">${gr.bucks} 💵 each</span>
            <button class="edit-btn" data-edit-grp="${gr.id}" title="Edit">✎</button>
            <button class="del-btn" data-del-grp="${gr.id}">×</button>
          </div>
          <div style="display:flex;gap:4px;margin-top:4px;">
            ${

            S.kids.map((k, i) => `<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:${contribs[i] ? 'var(--k' + i + '-mid)' : 'var(--card2)'};color:${contribs[i] ? 'white' : 'var(--muted)'};">${k}</span>`).join('')}
          </div>
          ${
            isEditing ? `
          <div class="edit-form">
            <div class="edit-form-row">
              <input id="egr-emoji" class="ef-emoji" value="${

            gr.emoji}" maxlength="2" />
              <input id="egr-name" class="ef-wide" value="${gr.name}" placeholder="Reward name" />
              <input id="egr-bucks" class="ef-sm" type="number" value="${gr.bucks}" min="1" />
            </div>
            <div class="edit-form-actions">
              <button class="cancel-edit-btn" id="cancel-edit-grp">Cancel</button>
              <button class="save-edit-btn" id="save-edit-grp" data-id="${


            gr.id}">Save Changes</button>
            </div>
          </div>`
            : ''}
        </div>`;}).join('')}
      <div class="add-form">
        <input id="ngr-emoji" class="f-emoji" placeholder="🍔" maxlength="2" />
        <input id="ngr-name" class="f-wide" placeholder="Group reward name" />
        <input id="ngr-bucks" class="f-sm" type="number" placeholder="Each" min="1" value="20" />
        <button class="add-btn" id="add-grp-btn">Add</button>
      </div>
      ${





        (S.groupRewards || []).some(g => (g.contributions || []).some(c => c)) ? `<button class="danger-btn" id="reset-group-contrib" style="margin-top:8px">↺ Reset Group Reward Contributions</button>` : ''}
    </div>

    <div class="admin-section">
      <h3>Resets</h3>
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5">Each button resets that data for all kids. Activity counts also reset automatically every night.</p>
      <button class="danger-btn" id="reset-activities">↺ Reset Today's Activity Counts</button>
      <button class="danger-btn" id="reset-bucks" style="margin-top:8px">↺ Reset All Buck Balances</button>
      <button class="danger-btn" id="reset-history" style="margin-top:8px">↺ Reset Redemption History</button>
    </div>`








        ;

        app.innerHTML = html;

        document.getElementById('admin-done').onclick = () => {
            adminMode = false;
            editingId = null;
            editingType = null;
            render();
        };
        document.getElementById('save-names').onclick = () => {
            S.kids.forEach((_, i) => {
                const el = document.getElementById(`kname-${i}`);
                if (el && el.value.trim())
                    S.kids[i] = el.value.trim();
            });
            save();
            showToast('Names saved');
            render();
        };
        document.querySelectorAll('[data-del-act]').forEach(el => {
            el.onclick = () => {
                const id = +el.dataset.delAct;
                S.activities = S.activities.filter(a => a.id !== id);
                S.completed.counts.forEach(c => {
                    if (c)
                        delete c[id];
                });
                save();
                render();
            };
        });
        document.querySelectorAll('[data-edit-act]').forEach(el => {
            el.onclick = () => {
                const id = +el.dataset.editAct;
                editingId = (editingId === id && editingType === 'activity') ? null : id;
                editingType = 'activity';
                render();
            };
        });
        const saveEditAct = document.getElementById('save-edit-act');
        if (saveEditAct) {
            const eaRepeat = document.getElementById('ea-repeat');
            eaRepeat.onclick = () => {
                const on = eaRepeat.dataset.on === 'true';
                eaRepeat.dataset.on = String(!on);
                eaRepeat.classList.toggle('on', !on);
            };
            saveEditAct.onclick = () => {
                const id = +saveEditAct.dataset.id;
                const act = S.activities.find(a => a.id === id);
                if (!act)
                    return;
                const name = document.getElementById('ea-name').value.trim();
                if (!name)
                    return;
                act.emoji = document.getElementById('ea-emoji').value.trim() || act.emoji;
                act.name = name;
                act.desc = document.getElementById('ea-desc').value.trim();
                act.bucks = parseInt(document.getElementById('ea-bucks').value) || act.bucks;
                act.repeatable = document.getElementById('ea-repeat').dataset.on === 'true';
                editingId = null;
                editingType = null;
                save();
                showToast('Activity updated');
                render();
            };
            document.getElementById('cancel-edit-act').onclick = () => {
                editingId = null;
                editingType = null;
                render();
            };
        }
        document.querySelectorAll('[data-vis-act]').forEach(el => {
            el.onclick = () => {
                const actId = +el.dataset.visAct;
                const kidIdx = +el.dataset.visKid;
                const act = S.activities.find(a => a.id === actId);
                if (!act)
                    return;
                if (!act.kidVis)
                    act.kidVis = [true, true, true];
                act.kidVis[kidIdx] = !act.kidVis[kidIdx];
                save();
                render();
            };
        });
        document.querySelectorAll('[data-del-rew]').forEach(el => {
            el.onclick = () => {
                S.rewards = S.rewards.filter(r => r.id !== +el.dataset.delRew);
                save();
                render();
            };
        });
        document.querySelectorAll('[data-edit-rew]').forEach(el => {
            el.onclick = () => {
                const id = +el.dataset.editRew;
                editingId = (editingId === id && editingType === 'reward') ? null : id;
                editingType = 'reward';
                render();
            };
        });
        const saveEditRew = document.getElementById('save-edit-rew');
        if (saveEditRew) {
            saveEditRew.onclick = () => {
                const id = +saveEditRew.dataset.id;
                const rew = S.rewards.find(r => r.id === id);
                if (!rew)
                    return;
                const name = document.getElementById('er-name').value.trim();
                if (!name)
                    return;
                rew.emoji = document.getElementById('er-emoji').value.trim() || rew.emoji;
                rew.name = name;
                rew.bucks = parseInt(document.getElementById('er-bucks').value) || rew.bucks;
                editingId = null;
                editingType = null;
                save();
                showToast('Reward updated');
                render();
            };
            document.getElementById('cancel-edit-rew').onclick = () => {
                editingId = null;
                editingType = null;
                render();
            };
        }
        document.querySelectorAll('[data-reset-bal]').forEach(el => {
            el.onclick = () => {
                S.balances[+el.dataset.resetBal] = 0;
                save();
                showToast('Balance reset to 0');
                render();
            };
        });
        document.getElementById('reset-activities').onclick = () => {
            if (!confirm('Reset all activity counts for today?'))
                return;
            S.completed = {
                date: todayStr(),
                counts: [{}, {}, {}]
            };
            save();
            showToast('Activity counts reset');
            render();
        };
        document.getElementById('reset-bucks').onclick = () => {
            if (!confirm('Reset ALL buck balances to zero?'))
                return;
            S.balances = [0, 0, 0];
            save();
            showToast('All balances reset');
            render();
        };
        document.getElementById('reset-history').onclick = () => {
            if (!confirm('Clear all redemption history?'))
                return;
            S.history = [];
            save();
            showToast('History cleared');
            render();
        };

        // Group rewards
        document.querySelectorAll('[data-del-grp]').forEach(el => {
            el.onclick = () => {
                S.groupRewards = S.groupRewards.filter(g => g.id !== +el.dataset.delGrp);
                save();
                render();
            };
        });
        document.querySelectorAll('[data-edit-grp]').forEach(el => {
            el.onclick = () => {
                const id = +el.dataset.editGrp;
                editingId = (editingId === id && editingType === 'group') ? null : id;
                editingType = 'group';
                render();
            };
        });
        const saveEditGrp = document.getElementById('save-edit-grp');
        if (saveEditGrp) {
            saveEditGrp.onclick = () => {
                const id = +saveEditGrp.dataset.id;
                const gr = S.groupRewards.find(g => g.id === id);
                if (!gr)
                    return;
                const name = document.getElementById('egr-name').value.trim();
                if (!name)
                    return;
                gr.emoji = document.getElementById('egr-emoji').value.trim() || gr.emoji;
                gr.name = name;
                gr.bucks = parseInt(document.getElementById('egr-bucks').value) || gr.bucks;
                editingId = null;
                editingType = null;
                save();
                showToast('Group reward updated');
                render();
            };
            document.getElementById('cancel-edit-grp').onclick = () => {
                editingId = null;
                editingType = null;
                render();
            };
        }
        const addGrpBtn = document.getElementById('add-grp-btn');
        if (addGrpBtn) {
            addGrpBtn.onclick = () => {
                const name = document.getElementById('ngr-name').value.trim();
                if (!name)
                    return;
                const bucks = parseInt(document.getElementById('ngr-bucks').value) || 20;
                const emoji = document.getElementById('ngr-emoji').value.trim() || '🎯';
                S.lastId++;
                if (!S.groupRewards)
                    S.groupRewards = [];
                S.groupRewards.push({
                    id: S.lastId,
                    name,
                    bucks,
                    emoji,
                    contributions: [false, false, false]
                });
                save();
                render();
            };
        }
        const resetGrpBtn = document.getElementById('reset-group-contrib');
        if (resetGrpBtn) {
            resetGrpBtn.onclick = () => {
                if (!confirm('Reset all group reward contributions? Kids will get their Bucks refunded.'))
                    return;
                S.groupRewards.forEach(gr => {
                    if (!gr.contributions)
                        return;
                    gr.contributions.forEach((c, i) => {
                        if (c) {
                            S.balances[i] += gr.bucks;
                        }
                    });
                    gr.contributions = [false, false, false];
                });
                save();
                showToast('Group contributions reset + refunded');
                render();
            };
        }
        const repeatToggle = document.getElementById('na-repeat');
        repeatToggle.onclick = () => {
            const on = repeatToggle.dataset.on === 'true';
            repeatToggle.dataset.on = String(!on);
            repeatToggle.classList.toggle('on', !on);
        };
        document.getElementById('add-act-btn').onclick = () => {
            const name = document.getElementById('na-name').value.trim();
            const bucks = parseInt(document.getElementById('na-bucks').value) || 5;
            const desc = document.getElementById('na-desc').value.trim();
            const emoji = document.getElementById('na-emoji').value.trim() || '⭐';
            const repeatable = document.getElementById('na-repeat').dataset.on === 'true';
            if (!name)
                return;
            S.lastId++;
            S.activities.push({
                id: S.lastId,
                name,
                desc,
                bucks,
                emoji,
                repeatable,
                kidVis: [true, true, true]
            });
            save();
            render();
        };
        document.getElementById('add-rew-btn').onclick = () => {
            const name = document.getElementById('nr-name').value.trim();
            const bucks = parseInt(document.getElementById('nr-bucks').value) || 10;
            const emoji = document.getElementById('nr-emoji').value.trim() || '🎁';
            if (!name)
                return;
            S.lastId++;
            S.rewards.push({
                id: S.lastId,
                name,
                bucks,
                emoji
            });
            save();
            render();
        };
    }

    const CORRECT_PIN = '1891';
    let pinEntry = '';
    let pinOverlay = null;

    function showPinPad() {
        pinEntry = '';
        pinOverlay = document.createElement('div');
        pinOverlay.className = 'pin-overlay';
        document.body.appendChild(pinOverlay);
        renderPinPad('');
    }

    function renderPinPad(errorMsg) {
        pinOverlay.innerHTML = `
    <div class="pin-box">
      <div class="pin-title">Parent Access</div>
      <div class="pin-sub">Enter your PIN to continue</div>
      <div class="pin-dots">
        ${



        [0, 1, 2, 3].map(i => `<div class="pin-dot${pinEntry.length > i ? (errorMsg ? ' error' : ' filled') : ''}"></div>`).join('')}
      </div>
      <div class="pin-error-msg">${
        errorMsg || ''}</div>
      <div class="pin-grid">
        ${
        [1, 2, 3, 4, 5, 6, 7, 8, 9].map(n => `<button class="pin-key" data-digit="${n}">${n}</button>`).join('')}
        <div></div>
        <button class="pin-key" data-digit="0">0</button>
        <button class="pin-key del" data-del>⌫</button>
      </div>
      <button class="pin-cancel" id="pin-cancel-btn">Cancel</button>
    </div>`





        ;

        pinOverlay.querySelectorAll('[data-digit]').forEach(btn => {
            btn.onclick = () => {
                if (pinEntry.length >= 4)
                    return;
                pinEntry += btn.dataset.digit;
                if (pinEntry.length === 4) {
                    if (pinEntry === CORRECT_PIN) {
                        pinOverlay.remove();
                        pinOverlay = null;
                        adminMode = true;
                        render();
                    } else {
                        renderPinPad('Incorrect PIN — try again');
                        setTimeout(() => {
                            pinEntry = '';
                            renderPinPad('');
                        }, 1200);
                    }
                } else {
                    renderPinPad('');
                }
            };
        });
        const delBtn = pinOverlay.querySelector('[data-del]');
        if (delBtn)
            delBtn.onclick = () => {
                pinEntry = pinEntry.slice(0, -1);
                renderPinPad('');
            };
        document.getElementById('pin-cancel-btn').onclick = () => {
            pinOverlay.remove();
            pinOverlay = null;
        };
    }

    load();
    </script>
</body>
</html>
